    <link rel="stylesheet" href="./CSS/estilos.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />

  <body>
    <header class="navbar">
      <span class="logo">
        <img src="./Imagenes/FNCS-Concept-6.webp" alt="" width="180" />
      </span>
      <ul class="navitems">
        <li><a href="./index.html">INICIO</a></li>
        <li><a href="./productos.html">PRODUCTOS</a></li>
        <li><a href="./contacto.html">CONTACTO</a></li>
      </ul>

    <main class="cont-principal">
      <div class="titulo-form">
        <h1>Contactate con nosotros</h1>
        <p>
          Si tienes algun problema con la pagina,<br />
          duda con alguno de nuestros productos o quieres formar parte del
          equipo de trabajo
        </p>
        <p>No dudes en contactarnos!</p>
      </div>
      <div class="cont-form">
        <h2 style="color: white">INGRESE SUS DATOS</h2>
        <form action="" class="form">
          <div class="items-form">
            <input type="text" placeholder="Ingrese su Nombre" />
          </div>
          <div class="items-form">
            <input type="email" placeholder="Ingrese su E-mail" />
          </div>
          <div class="items-form">
            <input type="tel" placeholder="Ingrese su numero de telefono" />
          </div>
          <div class="items-form">
            <textarea
              name=""
              id=""
              placeholder="Ingrese el motivo del contacto"
              maxlength="500"
            ></textarea>
          </div>
          <button class="btn-form">ENVIAR</button>
        </form>
      </div>
    </main>

    <footer class="footer">
